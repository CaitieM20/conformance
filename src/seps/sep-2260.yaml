sep: 2260
spec_url: https://modelcontextprotocol.io/specification/draft/basic/transports#streamable-http
requirements:
  - check: sep-2260-no-standalone-restricted-requests
    text: 'roots/list, sampling/createMessage, and elicitation/create requests MUST NOT be sent on standalone streams.'
  - check: sep-2260-client-error-unassociated-elicitation
    text: 'Clients MUST return standard JSON-RPC errors for common failure cases: Server sends an elicitation/create request with no associated client-to-server request: -32602 (Invalid params)'
    url: https://modelcontextprotocol.io/specification/draft/client/elicitation
  - check: sep-2260-client-error-unassociated-roots
    text: 'Clients SHOULD return standard JSON-RPC errors for common failure cases: Server sends a roots/list request with no associated client-to-server request: -32602 (Invalid params)'
    url: https://modelcontextprotocol.io/specification/draft/client/roots
  - check: sep-2260-client-error-unassociated-sampling
    text: 'Clients SHOULD return errors for common failure cases: Sampling request not associated with a client-to-server request: -32602 (Invalid params)'
    url: https://modelcontextprotocol.io/specification/draft/client/sampling

  - text: 'These messages MUST relate to the originating client request.'
    excluded: 'Semantic association ("relate to") is not protocol-observable. The harness cannot determine whether a server request conceptually relates to the client request without understanding application logic.'
  - text: 'Implementations SHOULD prefer transport-level SSE keepalive mechanisms for idle-connection maintenance.'
    excluded: 'Implementation preference for keepalive mechanism choice; not observable on the wire.'
    url: https://modelcontextprotocol.io/specification/draft/basic/utilities/ping
  - text: 'Servers MUST send server-to-client requests (such as roots/list, sampling/createMessage, or elicitation/create) only in association with an originating client request (e.g., during tools/call, resources/read, or prompts/get processing).'
    excluded: 'Server-side behavioral constraint. The observable wire violation (sending on standalone streams) is covered by sep-2260-no-standalone-restricted-requests. The broader semantic association is not protocol-observable.'
    url: https://modelcontextprotocol.io/specification/draft/client/elicitation
  - text: 'Standalone server-initiated requests of these types on independent communication streams (unrelated to any client request) are not supported and MUST NOT be implemented.'
    excluded: 'Same observable behavior as sep-2260-no-standalone-restricted-requests stated from the feature pages. Duplicates the transports.mdx requirement.'
    url: https://modelcontextprotocol.io/specification/draft/client/elicitation
  - text: 'Servers MUST send sampling/createMessage requests only in association with an originating client request (e.g., during tools/call, resources/read, or prompts/get processing).'
    excluded: 'Server-side behavioral constraint. Observable portion covered by sep-2260-no-standalone-restricted-requests.'
    url: https://modelcontextprotocol.io/specification/draft/client/sampling
  - text: 'Standalone server-initiated sampling on independent communication streams (unrelated to any client request) is not supported and MUST NOT be implemented.'
    excluded: 'Same observable behavior as sep-2260-no-standalone-restricted-requests stated from the sampling page.'
    url: https://modelcontextprotocol.io/specification/draft/client/sampling
  - text: 'Servers MUST send server-to-client requests (such as roots/list, sampling/createMessage, or elicitation/create) only in association with an originating client request (e.g., during tools/call, resources/read, or prompts/get processing).'
    excluded: 'Duplicate of elicitation.mdx requirement, stated in roots.mdx. Same rationale.'
    url: https://modelcontextprotocol.io/specification/draft/client/roots
  - text: 'Standalone server-initiated requests of these types on independent communication streams (unrelated to any client request) are not supported and MUST NOT be implemented.'
    excluded: 'Duplicate of elicitation.mdx MUST NOT requirement, stated in roots.mdx.'
    url: https://modelcontextprotocol.io/specification/draft/client/roots
